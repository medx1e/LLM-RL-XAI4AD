debug_flag: false
perf_flag: false
cache_flag: false
total_timesteps: 25000000
num_envs: 16
num_episode_per_epoch: 4
num_scenario_per_eval: 256
scenario_length: 80
log_freq: 50
save_freq: 200
eval_freq: 0
seed: 42
name_run: womd_sac_road_perceiver_minimal_42
name_exp: RLC2
path_dataset: womd_training
path_dataset_eval: null
waymo_dataset: false
max_num_objects: 64
termination_keys:
- offroad
- overlap
- run_red_light
reward_type: linear
reward_config:
  overlap:
    bonus: 0.0
    penalty: -1.0
    weight: 1.0
  offroad:
    bonus: 0.0
    penalty: -1.0
    weight: 1.0
  red_light:
    penalty: -1.0
    weight: 1.0
  off_route:
    penalty: -1.0
    weight: 0.6
  progression:
    bonus: 1.0
    penalty: 0.0
    weight: 0.2
observation_type: road
observation_config:
  obs_past_num_steps: 5
  objects:
    features:
    - waypoints
    - velocity
    - yaw
    - size
    - valid
    num_closest_objects: 8
  roadgraphs:
    features:
    - waypoints
    - direction
    - valid
    interval: 2
    max_meters: 70
    roadgraph_top_k: 200
    meters_box:
      front: 70
      back: 5
      left: 20
      right: 20
    max_num_lanes: 10
    max_num_points_per_lane: 20
  traffic_lights:
    features:
    - waypoints
    - state
    - valid
    num_closest_traffic_lights: 5
  path_target:
    features:
    - waypoints
    num_points: 10
    points_gap: 5
algorithm:
  network:
    policy:
      type: mlp
      layer_sizes:
      - 256
      - 64
      - 32
      activation: relu
      final_activation: null
    value:
      type: mlp
      layer_sizes:
      - 256
      - 64
      - 32
      activation: relu
      final_activation: relu
      num_networks: 2
      shared_encoder: false
    action_distribution: gaussian
    encoder:
      type: none
  name: SAC
  unroll_length: 1
  learning_rate: 0.0001
  discount: 0.99
  tau: 0.005
  alpha: 0.2
  batch_size: 64
  grad_updates_per_step: 4
  buffer_size: 1000000
  learning_start: 50000
network:
  policy:
    type: mlp
    layer_sizes: ${algorithm.network.policy.layer_sizes}
    activation: ${algorithm.network.policy.activation}
    final_activation: ${algorithm.network.policy.final_activation}
  value:
    type: mlp
    layer_sizes: ${algorithm.network.value.layer_sizes}
    activation: ${algorithm.network.value.activation}
    final_activation: ${algorithm.network.value.final_activation}
    num_networks: ${algorithm.network.value.num_networks}
    shared_encoder: ${algorithm.network.value.shared_encoder}
  action_distribution: gaussian
  encoder:
    type: perceiver
    embedding_layer_sizes:
    - 256
    - 256
    embedding_activation: relu
    encoder_depth: 4
    dk: 64
    num_latents: 16
    latent_num_heads: 2
    latent_head_features: 16
    cross_num_heads: 2
    cross_head_features: 16
    ff_mult: 2
    attn_dropout: 0.0
    ff_dropout: 0.0
    tie_layer_weights: true
